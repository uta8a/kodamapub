name: Mastodon E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mastodon-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUBLIC_BASE_URL: http://edge

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Mastodon E2E
        shell: bash
        run: bash scripts/ci/mastodon-e2e.sh
