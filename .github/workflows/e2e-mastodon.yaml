name: Mastodon E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mastodon-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KIND_VERSION: v0.31.0
      KUBECTL_VERSION: v1.36.0
      HELM_VERSION: v3.20.2

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Kubernetes tools
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64" -o kind
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tar.gz
          tar -xzf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Run Mastodon E2E
        shell: bash
        run: bash scripts/ci/mastodon-e2e.sh
