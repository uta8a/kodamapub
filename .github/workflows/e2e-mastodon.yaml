name: Mastodon E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mastodon-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUBLIC_BASE_URL: http://edge

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build edge image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: scripts/docker/edge.Dockerfile
          load: true
          push: false
          tags: kodamapub-edge:latest
          cache-from: type=gha,scope=kodamapub-edge
          cache-to: type=gha,mode=max,scope=kodamapub-edge

      - name: Build server image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: scripts/docker/server.Dockerfile
          load: true
          push: false
          tags: kodamapub-server:latest
          cache-from: type=gha,scope=kodamapub-server
          cache-to: type=gha,mode=max,scope=kodamapub-server

      - name: Build web image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: scripts/docker/web.Dockerfile
          load: true
          push: false
          tags: kodamapub-web:latest
          cache-from: type=gha,scope=kodamapub-web
          cache-to: type=gha,mode=max,scope=kodamapub-web

      - name: Build cli image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: scripts/docker/cli-job.Dockerfile
          load: true
          push: false
          tags: kodamapub-cli-job:latest
          cache-from: type=gha,scope=kodamapub-cli-job
          cache-to: type=gha,mode=max,scope=kodamapub-cli-job

      - name: Run Mastodon E2E
        shell: bash
        run: bash scripts/ci/mastodon-e2e.sh
